        </ul>
    </nav>
    <button id="theme-toggle" class="theme-toggle-button">Changer l'apparence</button>
</header>
<main>
    <section class="contact">
        <h2 data-i18n="contact.title">Contactez-Nous</h2>

        <div class="contact-container">

            <!-- Infos -->
            <div class="contact-card">
                <h2 data-i18n="contact.infoHeading">Mes coordonnées</h2>

                <p data-i18n="contact.location">📍 Lubumbashi, RDC</p>

                <a class="btn-whatsapp" href="https://wa.me/243998608225" target="_blank" data-i18n="contact.whatsapp">
                    💬 Me contacter sur WhatsApp
                </a>

                <a class="btn-telegram" href="https://t.me/998608225" target="_blank" data-i18n="contact.telegram">
                    ✈️ Me contacter sur Telegram
                </a>

            </div>

            <!-- Formulaire -->
            <form class="contact-card">
                <h2 data-i18n="contact.messageHeading">Envoyer un message</h2>

                <label data-i18n="contact.nameLabel">Nom</label>
                <input type="text" placeholder="Votre nom" data-i18n-attr="placeholder" data-i18n="contact.namePlaceholder" required>

                <label data-i18n="contact.phoneLabel">Téléphone</label>
                <input type="tel" placeholder="Votre numéro" data-i18n-attr="placeholder" data-i18n="contact.phonePlaceholder" required>

                <button type="submit" data-i18n="contact.sendButton">Envoyer</button>
            </form>

        </div>
    </section>
</main>
</main>
